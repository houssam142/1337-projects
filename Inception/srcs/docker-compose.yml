services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    environment:
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - /home/hounejja/data/mariadb:/var/lib/mysql
    networks:
      - inception_network
    restart: unless-stopped
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_DATABASE}
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    networks:
      - inception_network
    restart: unless-stopped
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "8080:443"
    depends_on:
      - wordpress
    networks:
      - inception_network
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    restart: unless-stopped
  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    networks:
      - inception_network
    restart: unless-stopped
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASSWORD: ${FTP_PASSWORD}
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    networks:
      - inception_network
    restart: unless-stopped
  static_website:
    build: ./requirements/bonus/static
    container_name: website
    ports:
      - "5501:5501"
    volumes:
      - /home/hounejja/data/static_web_data
    networks:
      - inception_network
    restart: unless-stopped
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    volumes:
      - /home/hounejja/data/adminer:/var/www/html
    networks:
      - inception_network
    restart: unless-stopped

volumes:
  mariadb_data:
  wordpress_data:
  secrets:

networks:
   inception_network:
     driver: bridge
