services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    environment:
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
    secrets:
      - db_password
      - db_root_password
      - credentials
    volumes:
      - /home/hounejja/data/mariadb:/var/lib/mysql
    networks:
      - inception_network
    restart: unless-stopped
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    depends_on:
      - mariadb
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      WORDPRESS_DB_HOST: ${DB_HOST}
      WORDPRESS_DB_NAME: ${DB_DATABASE}
      WORDPRESS_USER: ${DB_USER}
    secrets:
      - db_password
      - db_root_password
      - credentials
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    networks:
      - inception_network
    restart: unless-stopped
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - inception_network
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    restart: unless-stopped
  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    image: redis
    ports:
      - "6380:6379"
    volumes:
      - /home/hounejja/data/redis:/etc/redis
    networks:
      - inception_network
    restart: unless-stopped
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp
    image: ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: ${FTP_USER}
    volumes:
      - /home/hounejja/data/wordpress:/var/www/html
    secrets:
      - credentials
    networks:
      - inception_network
    restart: unless-stopped
  mywebsite:
    build: ./requirements/bonus/static
    container_name: website
    image: mywebsite
    ports:
      - "5500:5500"
    volumes:
      - /home/hounejja/data/static_web_data
    networks:
      - inception_network
    restart: unless-stopped
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    image: adminer
    volumes:
      - /home/hounejja/data/adminer_data:/var/www/html
    ports:
      - "8080:8080"
    networks:
      - inception_network
    restart: unless-stopped
  upload:
    build: ./requirements/bonus/upload
    container_name: upload
    image: upload
    ports:
      - "9443:9443"
    volumes:
      - /home/hounejja/data/upload_data:/uploads
    networks:
      - inception_network
    restart: unless-stopped

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

volumes:
  mariadb_data:
  wordpress_data:

networks:
   inception_network:
     driver: bridge
